# Deploy on Render: Dashboard -> New -> Blueprint -> connect this GitHub repo.
# Free tier: web service sleeps after 15 min idle; Postgres free DB expires after 30 days.
services:
  - type: web
    name: support-desk
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: support-desk-db
          property: connectionString
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: support-desk-db
    plan: free
    databaseName: support_desk
    user: support_desk
